<div class="min-h-screen bg-ink-50">
  <aside
    class="fixed inset-y-0 left-0 z-30 flex flex-col border-r border-ink-200 bg-white transition-all duration-300"
    [class.w-72]="!collapsed"
    [class.w-20]="collapsed"
  >
    <div class="flex h-20 items-center gap-3 border-b border-ink-200 px-5">
      <div class="grid h-11 w-11 shrink-0 place-items-center rounded-lg bg-brand-600 text-sm font-black text-white">CS</div>
      <div *ngIf="!collapsed" class="min-w-0">
        <p class="truncate text-sm font-black text-ink-900">Colegio Sol</p>
        <p class="truncate text-xs font-semibold text-ink-500">Gestion escolar</p>
      </div>
    </div>

    <nav class="flex-1 space-y-1 px-3 py-5" *ngIf="currentRoute$ | async as currentRoute">
      <a
        *ngFor="let item of navigationItems"
        class="group flex h-12 items-center gap-3 rounded-lg px-3 text-sm font-bold transition"
        [routerLink]="item.path"
        [class.bg-brand-50]="isActive(item, currentRoute)"
        [class.text-brand-700]="isActive(item, currentRoute)"
        [class.text-ink-500]="!isActive(item, currentRoute)"
        [class.justify-center]="collapsed"
      >
        <span class="grid h-9 w-9 shrink-0 place-items-center rounded-md transition" [class.bg-white]="isActive(item, currentRoute)">
          <ng-container [ngSwitch]="item.icon">
            <svg *ngSwitchCase="'dashboard'" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 13h8V3H3v10Zm10 8h8V3h-8v18ZM3 21h8v-6H3v6Z" />
            </svg>
            <svg *ngSwitchCase="'students'" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
            <svg *ngSwitchCase="'payments'" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="5" width="20" height="14" rx="2" />
              <path d="M2 10h20" />
              <path d="M7 15h4" />
            </svg>
            <svg *ngSwitchCase="'settings'" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z" />
              <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8.5 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 8.5a1.7 1.7 0 0 0-.34-1.88l-.06-.06A2 2 0 1 1 7.03 3.73l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 15.5 4.6a1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c0 .4.22.78.6 1 .3.2.7.4 1.1.4H21a2 2 0 1 1 0 4h-.09A1.7 1.7 0 0 0 19.4 15Z" />
            </svg>
          </ng-container>
        </span>
        <span *ngIf="!collapsed" class="truncate">{{ item.label }}</span>
      </a>
    </nav>

    <div class="border-t border-ink-200 p-3">
      <button
        class="flex h-11 w-full items-center gap-3 rounded-lg px-3 text-sm font-bold text-ink-500 transition hover:bg-ink-50"
        type="button"
        (click)="toggleSidebar()"
        [class.justify-center]="collapsed"
      >
        <svg class="h-5 w-5 transition" [class.rotate-180]="collapsed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m15 18-6-6 6-6" />
        </svg>
        <span *ngIf="!collapsed">Contraer menu</span>
      </button>
    </div>
  </aside>

  <div class="transition-all duration-300" [class.pl-72]="!collapsed" [class.pl-20]="collapsed">
    <header class="sticky top-0 z-20 flex h-20 items-center justify-between border-b border-ink-200 bg-white/92 px-7 backdrop-blur">
      <div>
        <p class="text-xs font-black uppercase tracking-normal text-brand-600">Colegio Sol</p>
        <h1 class="text-xl font-black text-ink-900">Panel de control</h1>
      </div>

      <div class="flex items-center gap-3" *ngIf="currentUser$ | async as currentUser">
        <button class="relative grid h-11 w-11 place-items-center rounded-lg border border-ink-200 bg-white text-ink-700 shadow-sm" type="button">
          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          <span class="absolute -right-1 -top-1 grid h-5 min-w-5 place-items-center rounded-full bg-danger-500 px-1 text-[11px] font-black text-white">
            {{ notificationCount(currentUser) }}
          </span>
        </button>

        <div class="hidden items-center gap-3 rounded-lg border border-ink-200 bg-white px-3 py-2 shadow-sm sm:flex">
          <div class="grid h-9 w-9 place-items-center rounded-md bg-brand-50 text-sm font-black text-brand-700">
            {{ currentUser.avatarInitials }}
          </div>
          <div>
            <p class="text-sm font-black text-ink-900">{{ currentUser.fullName }}</p>
            <p class="text-xs font-bold text-ink-500">{{ roleLabel(currentUser) }}</p>
          </div>
        </div>

        <button class="rounded-lg border border-ink-200 bg-white px-4 py-2 text-sm font-black text-ink-700 shadow-sm transition hover:bg-ink-50" type="button" (click)="logout()">
          Salir
        </button>
      </div>
    </header>

    <main class="p-7">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
